name: Build Rajahuli99 Signed Release APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Rajahuli99 project
        run: |
          rm -rf extracted_project
          mkdir extracted_project

          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "PROJECT_DIR=$PWD" >> $GITHUB_ENV
            echo "Gradle project already exists in root"
            exit 0
          fi

          ZIP_FILE=$(find . -maxdepth 1 -type f -iname "*SIGNED*RELEASE*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE=$(find . -maxdepth 1 -type f -iname "*Rajahuli*.zip" | head -n 1)
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "Rajahuli ZIP file nahi mila"
            exit 1
          fi

          echo "Found ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted_project

          SETTINGS_FILE=$(find extracted_project \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ZIP ke andar Android project nahi mila"
            find extracted_project -maxdepth 3 -type f
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project dir: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build Release APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          mkdir -p output

          keytool -genkeypair \
            -v \
            -keystore rajahuli99-release.jks \
            -storepass rajahuli99123 \
            -keypass rajahuli99123 \
            -alias rajahuli99 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Rajahuli99, OU=Rajahuli99, O=Rajahuli99, L=Bangalore, ST=Karnataka, C=IN"

          $ANDROID_HOME/build-tools/35.0.0/zipalign -p -f 4 \
            "$PROJECT_DIR/app/build/outputs/apk/release/app-release-unsigned.apk" \
            output/Rajahuli99-aligned.apk

          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks rajahuli99-release.jks \
            --ks-pass pass:rajahuli99123 \
            --key-pass pass:rajahuli99123 \
            --out output/Rajahuli99.apk \
            output/Rajahuli99-aligned.apk

          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose output/Rajahuli99.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rajahuli99-SIGNED-RELEASE-APK
          path: output/Rajahuli99.apk

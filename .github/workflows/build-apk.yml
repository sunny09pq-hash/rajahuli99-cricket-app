name: Build Rajahuli99 Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Find Flutter project
        run: |
          echo "Repo files:"
          ls -la
          APP_DIR=$(dirname "$(find . -name pubspec.yaml -not -path "*/build/*" | head -n 1)")
          if [ -z "$APP_DIR" ] || [ "$APP_DIR" = "." ]; then
            APP_DIR="."
          fi
          if [ ! -f "$APP_DIR/pubspec.yaml" ]; then
            echo "pubspec.yaml not found. Please upload extracted Flutter files, not ZIP only."
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "Flutter project found at: $APP_DIR"
          ls -la "$APP_DIR"

      - name: Generate Android project files
        run: cd "$APP_DIR" && flutter create --platforms=android .

      - name: Install Flutter packages
        run: cd "$APP_DIR" && flutter pub get

      - name: Build release APK
        run: cd "$APP_DIR" && flutter build apk --release

      - name: Copy APK
        run: cp "$APP_DIR/build/app/outputs/flutter-apk/app-release.apk" Rajahuli99-Cricket.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rajahuli99-Cricket-APK
          path: Rajahuli99-Cricket.apk

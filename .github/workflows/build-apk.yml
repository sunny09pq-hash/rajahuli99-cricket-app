name: Build Rajahuli99 Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract uploaded app ZIP
        run: |
          echo "Files before extract:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP found. Continuing..."
          else
            echo "Extracting $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d .
          fi

          echo "Files after extract:"
          ls -la

      - name: Find Flutter project
        run: |
          APP_DIR=$(find . -type f -name "pubspec.yaml" -not -path "*/build/*" -exec dirname {} \; | head -n 1)

          if [ -z "$APP_DIR" ]; then
            echo "pubspec.yaml not found even after ZIP extract."
            echo "Repo files:"
            find . -maxdepth 4 -type f
            exit 1
          fi

          echo "Flutter project found at: $APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          ls -la "$APP_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android files
        run: cd "$APP_DIR" && flutter create --platforms=android .

      - name: Install Flutter packages
        run: cd "$APP_DIR" && flutter pub get

      - name: Build release APK
        run: cd "$APP_DIR" && flutter build apk --release

      - name: Copy APK
        run: cp "$APP_DIR/build/app/outputs/flutter-apk/app-release.apk" Rajahuli99-Cricket.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rajahuli99-Cricket-APK
          path: Rajahuli99-Cricket.apk

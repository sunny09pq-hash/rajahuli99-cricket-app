name: Build Rajahuli99 Smooth WebView APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Find and unzip Rajahuli99 project
        run: |
          ZIP_FILE=$(find . -maxdepth 3 -type f \( -iname '*Rajahuli99*SMOOTH*.zip' -o -iname '*WEBVIEW*SMOOTH*.zip' -o -iname '*webview*smooth*.zip' \) | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Rajahuli99 smooth WebView ZIP file not found."
            exit 1
          fi
          rm -rf extracted
          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -type f -name settings.gradle -printf '%h\n' | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Wrong ZIP uploaded."
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p final-apk
          APK_FILE=$(find "$PROJECT_DIR/app/build/outputs/apk/debug" -name '*.apk' | head -n 1)
          cp "$APK_FILE" final-apk/Rajahuli99-Smooth-WebView.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rajahuli99-SMOOTH-WEBVIEW-APK
          path: final-apk/Rajahuli99-Smooth-WebView.apk

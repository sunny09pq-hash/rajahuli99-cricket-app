name: Build Run999 APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find Run999 ZIP
        run: |
          ZIP_FILE=$(ls *Run999*.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Run999 ZIP file repo root me nahi mila"
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Found: $ZIP_FILE"

      - name: Unzip Run999 project
        run: |
          rm -rf run999_build
          mkdir run999_build
          unzip -q "$ZIP_FILE" -d run999_build
          ls -la run999_build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build Debug APK
        working-directory: run999_build
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp run999_build/app/build/outputs/apk/debug/app-debug.apk output/Run999.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Run999-APK
          path: output/Run999.apk
